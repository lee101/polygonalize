name: test
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - run: go test ./...
      - run: GOOS=js GOARCH=wasm go build -o /tmp/polygonalize.wasm ./cmd/wasm
      - run: go build ./cmd/polygonalize ./cmd/polygonalize-server

