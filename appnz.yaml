name: polygon
runtime: server
build:
  command: |
    set -eu
    POLYGONALIZE_GO_TMP="$(mktemp -d)"
    trap 'rm -rf "$POLYGONALIZE_GO_TMP"' EXIT
    mkdir -p bin web/assets
    curl -fsSL https://go.dev/dl/go1.25.10.linux-amd64.tar.gz -o "$POLYGONALIZE_GO_TMP/go.tar.gz"
    tar -xzf "$POLYGONALIZE_GO_TMP/go.tar.gz" -C "$POLYGONALIZE_GO_TMP"
    export GOROOT="$POLYGONALIZE_GO_TMP/go"
    export PATH="$GOROOT/bin:$PATH"
    go build -trimpath -o bin/polygonalize-server ./cmd/polygonalize-server
    GOOS=js GOARCH=wasm go build -trimpath -ldflags="-s -w" -o web/assets/polygonalize.wasm ./cmd/wasm
    cp "$GOROOT/lib/wasm/wasm_exec.js" web/assets/wasm_exec.js
    chmod 0755 bin/polygonalize-server
  dockerfile: Dockerfile
output: web
run:
  command: ./bin/polygonalize-server
  port: 8080
env:
  POLYGONALIZE_MAX_UPLOAD_MB: "16"
github:
  repo: lee101/polygonalize
  branch: main
  autoDeploy: true
